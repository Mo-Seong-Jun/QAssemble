site_name: QAssemble
site_url: https://Mo-Seong-Jun.github.io/QAssemble/
site_description: >
  A pure-Python quantum simulation package for calculating electronic
  properties of materials using diagrammatic many-body perturbation theory.
site_author: Mo Seong Jun

repo_name: Mo-Seong-Jun/QAssemble
repo_url: https://github.com/Mo-Seong-Jun/QAssemble

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - content.code.copy

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.inlinehilite
  - admonition
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Reference:
    - Serial Modules: SerialModules.md
    - Class Diagram: SerialClassDiagram.md

docs_dir: docs
